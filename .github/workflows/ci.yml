name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U rag -d rag"
          --health-interval 3s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s --health-timeout 3s --health-retries 20
    env:
      DATABASE_URL: postgresql://rag:rag@localhost:5432/rag
      REDIS_URL: redis://localhost:6379
      # No GEMINI_API_KEY -> deterministic offline embedder, so the eval is free + reproducible.
      PORT: 8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Start API
        run: |
          node dist/main.js &
          echo $! > api.pid
          for i in $(seq 1 30); do curl -sf localhost:8000/health && break; sleep 2; done
      - name: Seed corpus
        run: npm run seed
      - name: Run retrieval eval
        run: npm run eval
      - name: Stop API
        if: always()
        run: kill "$(cat api.pid)" || true
